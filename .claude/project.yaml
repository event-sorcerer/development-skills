# yaml-language-server: $schema=https://raw.githubusercontent.com/Zugruul/development-skills/main/plugins/spec-workflow/schemas/project-config.schema.json
# Synced 2026-07-08: repo transferred event-sorcerer/development-skills ->
# Zugruul/development-skills; board migrated org-project #1 -> user-project #5
# (Priority/Estimate fields + full Status flow re-created there to match).
schemaVersion: 2
project:
    name: Zugruul/development-skills
    description: Claude Code plugin marketplace; spec-workflow (the autonomous build-loop plugin) develops itself here — dogfood.
    mainBranch: main
    branchPattern: sw/<id>-<slug>
boards:
-   id: main
    provider: github-project
    owner: Zugruul
    repo: Zugruul/development-skills
    projectNumber: 5
    projectId: PVT_kwHOAL1A3M4Bc3ai
    fields:
        status:
            fieldId: PVTSSF_lAHOAL1A3M4Bc3aizhXdGkQ
            options:
                Backlog: f75ad846
                In progress: 47fc9ee4
                In review: 8c531254
                QA: bb088b91
                Ready: 1d114d70
                Deployed: '98236657'
        priority:
            fieldId: PVTSSF_lAHOAL1A3M4Bc3aizhXdJCI
            options:
                P0: 5b64f2a0
                P1: 0bbfb00e
                P2: 0d537efa
        estimate:
            fieldId: PVTF_lAHOAL1A3M4Bc3aizhXdJCM
    statusFlow:
    - Backlog
    - In progress
    - In review
    - QA
    - Ready
    - Deployed
    labels:
        bug: type:bug
        feature: type:feature
specs:
-   id: sw
    title: spec-workflow v1 development (SPEC.md)
    board: main
    specPath: SPEC.md
    backlogPath: docs/BACKLOG.md
    taskPrefix: SW
    epics:
    -   id: E0
        title: Workflow UX
        taskRanges:
        -   - 1
            - 9
    -   id: E1
        title: Hardening
        taskRanges:
        -   - 10
            - 19
    -   id: E2
        title: Self-improvement completion
        taskRanges:
        -   - 20
            - 29
    invariants:
    - Scripts are bash 3.2-compatible, use `set -uo pipefail`, and pass shellcheck -x.
    - Python is stdlib-only; PyYAML is the sole permitted dependency.
    - Scripts decide, the model obeys — decisions live in tested scripts, never in prose instructions.
    - board.sh is the only board access; never call `gh project` directly from skills or briefs.
    - Brains are orchestrator-mediated only; no role ever reads another role's brain directory.
    - Red-first TDD — a failing-test commit precedes implementation; the gate is green before In review.
    - Documentation covered by docs[] is updated in the same PR as the behavior it describes.
    - Model ids use full nomenclature only (e.g. claude-sonnet-5[1m]), never shorthand.
    - Agent names are role-prefix-first with a meaningful scope suffix (dev-sw001), never bare counters.
    - No generic Claude co-author trailers on in-workflow commits; role identities are the attribution.
-   id: mem
    title: Memory scaling — identity-brain memory (SPEC-MEMORY.md)
    board: main
    specPath: SPEC-MEMORY.md
    backlogPath: docs/BACKLOG-MEM.md
    taskPrefix: MEM
    epics:
    -   id: E0
        title: Feedback lifecycle
        taskRanges:
        -   - 1
            - 9
    -   id: E1
        title: Local-state gitignore management
        taskRanges:
        -   - 10
            - 19
    -   id: E2
        title: Unified brain-event feed
        taskRanges:
        -   - 20
            - 29
    -   id: E3
        title: Retrieval upgrade (embeddings + PPR)
        taskRanges:
        -   - 30
            - 39
    -   id: E4
        title: Write-path anti-degradation
        taskRanges:
        -   - 40
            - 49
        blockedBy:
        -   epic: E3
            untilStatus: Deployed
    -   id: E5
        title: Neural-view on the unified feed
        taskRanges:
        -   - 50
            - 59
        blockedBy:
        -   epic: E2
            untilStatus: Deployed
    invariants:
    - Notes are plain markdown + YAML frontmatter, OKF-compatible; no note content lives only in a database.
    - Every derived layer (embedding index, folds, adjacency caches) is rebuildable from committed files + feeds alone.
    - Feed appends are atomic single-line writes; no shared JSON file is read-modify-written on any concurrent path unless it is a derived cache.
    - Role privacy holds — no role reads another role's brain; consult is the only cross-role path and is orchestrator-mediated.
    - Superseded notes are never deleted and never injected.
    - Core scripts remain stdlib-only; capability modules own their dependencies in isolated venvs and their absence degrades features, never breaks flows.
    - Graduation and skill promotion remain verifier-gated, never model self-judgment.
    - Additive-only — every new mechanism is opt-in, defaults preserve current behavior, and no existing flow breaks when a new component is absent or disabled.
-   id: peer
    title: Peer review + remote LLM dispatch (SPEC-PEER-REVIEW.md)
    board: main
    specPath: SPEC-PEER-REVIEW.md
    backlogPath: docs/BACKLOG-PEER-REVIEW.md
    taskPrefix: PRV
    epics:
    -   id: E0
        title: /peer-review skill
        taskRanges:
        -   - 1
            - 9
    -   id: E1
        title: Remote LLM dispatch
        taskRanges:
        -   - 10
            - 19
    invariants:
    - A peer review NEVER writes -- every codex invocation uses --sandbox read-only; the review path contains no file-modifying code.
    - Secrets never enter git -- registry token fields are env-var references only; any inline literal is a refusal, not a warning.
    - Resolved token values never appear in stdout, stderr, logs, or error messages.
    - No persistent process, daemon, heartbeat, or background agent is installed on any machine by this work; everything runs synchronously at the moment of use.
    - Content leaves the machine only to endpoints explicitly declared in .claude/compute-registry.yaml, or to OpenAI via the user-installed codex CLI -- and the latter is disclosed in the skill doc.
    - External-model findings are always labeled with their source and never presented as, or silently merged into, Claude's own judgment.
    - Scripts are bash 3.2-compatible / stdlib-only Python, set -uo pipefail, shellcheck-clean.
-   id: gl
    title: Graphify-inspired improvements — learning loop, recall signals, neural-view (SPEC-GRAPHIFY.md)
    board: main
    specPath: SPEC-GRAPHIFY.md
    backlogPath: docs/BACKLOG-GRAPHIFY.md
    taskPrefix: GL
    epics:
    -   id: E0
        title: Learning-loop foundations
        taskRanges:
        -   - 1
            - 9
    -   id: E1
        title: 'Ranking signals: recency, staleness, confidence'
        taskRanges:
        -   - 10
            - 19
        blockedBy:
        -   epic: E0
            untilStatus: Deployed
    -   id: E2
        title: Graph interrogation (explain / path)
        taskRanges:
        -   - 20
            - 29
        blockedBy:
        -   epic: E1
            untilStatus: Deployed
    -   id: E3
        title: Neural-view structure
        taskRanges:
        -   - 30
            - 39
        blockedBy:
        -   epic: E2
            untilStatus: Deployed
    -   id: E4
        title: Consolidation + retro friction
        taskRanges:
        -   - 40
            - 49
    invariants:
    - Brains remain orchestrator-mediated; no role reads another role's brain directory; subagents receive knowledge only as pasted brief text.
    - No graphify, tree-sitter, embedding, or graph-library dependency is introduced; scripts stay bash 3.2-compatible and Python stdlib-only (PyYAML sole exception).
    - Every new data file (e.g. outcomes.jsonl) degrades byte-identically — its absence reproduces pre-change behavior exactly, covered by a regression fixture.
    - .activation.jsonl and brain-events.jsonl schemas are append-extended only; new event types allowed, existing fields never repurposed.
    - Every brain-mutating command refuses or loudly warns when one invocation would remove more than a configured fraction of notes or links (shrink guard).
    - No new artifact is written into prompt-cache-visible workspace paths; new outputs live in existing .claude/ locations or stdout.
    - Red-first TDD — a failing-test commit precedes implementation; the gate is green before In review.
    - Documentation covered by docs[] is updated in the same PR as the behavior it describes.
-   id: cdx
    title: Dual-host compatibility — Claude Code + Codex (SPEC-CODEX-COMPAT.md)
    board: main
    specPath: SPEC-CODEX-COMPAT.md
    backlogPath: docs/BACKLOG-CODEX-COMPAT.md
    taskPrefix: CDX
    epics:
    -   id: E0
        title: Codex packaging & plugin-root resolution
        taskRanges:
        -   - 1
            - 9
    -   id: E1
        title: Portable interaction & invocation semantics
        taskRanges:
        -   - 10
            - 19
    -   id: E2
        title: Host-aware delegation & model resolution
        taskRanges:
        -   - 20
            - 29
    -   id: E3
        title: Build-loop & enforcement parity
        taskRanges:
        -   - 30
            - 39
    -   id: E4
        title: CI, documentation & compatibility matrix
        taskRanges:
        -   - 40
            - 49
    -   id: E5
        title: Compatibility sweep for new/in-flight work
        taskRanges:
        -   - 50
            - 59
    invariants:
    - One shared script/schema/template/test engine; no skill, script, or schema is forked into separate per-host copies.
    - '`name` and `description` are the only frontmatter fields either host is assumed to enforce; `allowed-tools` remains a Claude-only enhancement, never the cross-host security boundary.'
    - Plugin-root resolution never reads the current working directory.
    - Critical safety enforcement (gate-before-review, checkpoint, truthful board state) is implemented in deterministic scripts/preflight checks, with hooks as defense in depth only — never the sole enforcement mechanism.
    - Existing `.claude/project.yaml` consumers on schemaVersion 2 remain valid with zero required changes; any new field is additive and optional.
    - Claude Code's existing installation, manifests, hooks, and slash-command invocation remain unchanged and functioning throughout.
    - No unrelated pre-existing working-tree changes are reverted, overwritten, staged, or committed by this work.
    - Degraded features are documented explicitly; none are silently faked or hidden.
commands:
    gate: bash plugins/spec-workflow/tests/run-tests.sh && shellcheck -x plugins/spec-workflow/scripts/*.sh plugins/spec-workflow/scripts/lib/*.sh plugins/spec-workflow/tests/*.sh && claude plugin validate plugins/spec-workflow
docs:
-   id: root
    path: README.md
    covers:
    - '**'
    notes: marketplace install/usage + skills table; update when skills or commands change
-   id: plugin
    path: plugins/spec-workflow/README.md
    covers:
    - plugins/spec-workflow/**
    notes: the plugin's user-facing docs — skills table, scripts list, config surface; every behavior/config change updates it
-   id: spec
    path: SPEC.md
    covers:
    - plugins/spec-workflow/**
    notes: contract for tracked development; changed contracts flow via docs/spec-deltas, never direct edits
-   id: peer-plugin
    path: plugins/peer-review/README.md
    covers:
    - plugins/peer-review/**
    notes: the plugin's user-facing docs — skills table, scripts list; every behavior/config change updates it
-   id: peer-spec
    path: SPEC-PEER-REVIEW.md
    covers:
    - plugins/peer-review/**
    notes: contract for peer-review + remote dispatch; changed contracts flow via docs/spec-deltas, never direct edits
delegation:
    identities:
        dev:
        -   name: Dev Agent - {name}
            email: '{local}+dev_agent@{domain}'
            color: '#ffd24d'
            models:
            - claude-sonnet-5
        reviewer:
            name: Reviewer Agent - {name}
            email: '{local}+reviewer_agent@{domain}'
            color: '#ff5b7f'
            models:
            - claude-fable-5[1m]
            - claude-sonnet-5
            - claude-sonnet-5[1m]
        orchestrator:
            name: Orchestrator Agent - {name}
            email: '{local}+orchestrator_agent@{domain}'
            color: '#38fad4'
        peer-reviewer:
            name: Peer Reviewer (codex) - {name}
            email: '{local}+peer_reviewer@{domain}'
paths:
    handoffDir: docs/handoffs
    checkpointFile: .claude/CHECKPOINT
    designDir: docs/design
    specDeltaDir: docs/spec-deltas
methodology:
    tdd: true
    serialDelivery: true
    maxInProgress: 5
    autoMerge: true
    mergeMethod: squash
    feedback:
        enabled: true
        roles: [orchestrator, dev, reviewer]
        autoTriage: true
work:
    type: local
    sync:
        mode: task-close
