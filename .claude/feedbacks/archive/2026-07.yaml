  severity: high
  summary: Agent shell cwd silently resets between tool calls, causing stray writes
    into a sibling lane's worktree
  detail: 'Two dev agents in parallel lanes reported their Bash cwd resetting to the
    OTHER lane''s worktree

    between calls; one cp landed in the wrong tree and was later discarded by the
    other agent as

    mystery contamination. Nothing bad was committed, but only because both agents
    checked git status.

    '
  evidence: []
  generalized: 'In parallel lanes, an agent''s shell working directory cannot be trusted
    to persist between tool

    calls. Briefs must mandate absolute-path discipline for EVERY command (git -C
    or cd-in-same-call),

    and agents should verify location before any write. Lane hygiene checks (git status
    before commit,

    verifying only intended files staged) caught real contamination and must stay
    mandatory.

    '
  routing:
    action: brain-note
    ref: lane-cwd-distrust
- category: friction
  area: permissions
  severity: medium
  summary: Permission-layer verdicts on identical merge actions vary across attempts
    within one session
  detail: 'Same-shaped squash merges were denied twice, then allowed four times later
    with no config change.

    '
  evidence: []
  generalized: 'Treat permission-layer outcomes as non-deterministic: on denial, park
    the artifact with clear

    resume instructions and continue other work; a single later retry when a comparable
    action

    succeeds is reasonable and not a bypass. Never burn rounds retrying immediately.

    '
  routing:
    action: brain-note
    ref: permission-nondeterminism
- category: worked-well
  area: review
  severity: low
  summary: Paired-PR review by one agent caught a critical regression the split reviews
    might have priced differently
  detail: 'One reviewer holding both enforcement-layer diffs reproduced a wrapper
    bypass in one PR by

    contrasting it with the code the other PR relied on.

    '
  evidence: []
  generalized: 'When two concurrent PRs touch the same subsystem, one reviewer holding
    both diffs finds

    cross-PR regressions (behavior one PR removes that the other depends on) that
    isolated

    per-PR reviews structurally miss.

    '
  routing:
    action: brain-note
    ref: paired-pr-single-reviewer
