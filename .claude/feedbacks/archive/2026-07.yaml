    ref: development-skills#33
- category: friction
  area: concurrency
  component: skills/build-next/references/concurrency.md
  severity: medium
  summary: Parallel lanes editing one shared test-suite file forces rebase conflicts
    on every merge
  detail: 'Three lanes all appended sections to the single tests/run-tests.sh; every
    merge forced the

    surviving lane into conflict resolution on that file.

    '
  evidence: []
  generalized: 'A single monolithic test entry file is a guaranteed conflict point
    for parallel lanes. Consider

    per-area test files sourced by a thin runner so lanes append to disjoint files,
    or a documented

    append-only convention that git merges cleanly.

    '
  proposal:
    target: plugins/spec-workflow/tests/
