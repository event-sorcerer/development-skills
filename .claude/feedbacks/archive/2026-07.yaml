  summary: Two-pass review plus independent adversarial quality pass caught real defects
    pre-merge
  detail: 'Reviewers reproduced a permission crash, a lying startup message, routing
    corruption on duplicate

    timestamps, and a path-containment escape before merge.

    '
  evidence: []
  generalized: 'Separating spec-compliance review from adversarial code-quality review,
    and requiring reviewers to

    REPRODUCE findings rather than read-only inspect, reliably surfaces defects the
    implementing agent

    and the test suite both missed.

    '
  routing:
    action: brain-note
    ref: reproduce-findings-two-pass
- category: incident
  area: board
  component: scripts/board.sh
  severity: medium
  summary: Filing new work mid-loop failed because the bug verb never adds issues
    to the project board
  detail: 'Two issues were created but invisible to the picker; manual repair via
    direct project item-add was

    needed, violating the single-access invariant once.

    '
  evidence: []
  generalized: 'Any verb that creates work items must add them to the board in the
    same operation and verify

    visibility before reporting success; otherwise new work silently never enters
    the loop.

    '
  routing:
    action: backlog
    ref: development-skills#26
