items:
- category: friction
  area: testing
  component: plugins/spec-workflow/tests
  severity: high
  summary: A test harness that sources every section file into one shared shell process
    is fragile to state leakage from any single section
  detail: One unscoped `cd` inside a test fixture (missing the subshell wrapping every
    sibling line in the same file used) permanently changed the suite's cwd for every
    section that ran afterward, since the runner sources section files rather than
    subprocessing them. The leaked-into directory was then deleted by the fixture's
    own cleanup, so ~35 later, completely unrelated tests failed with confusing subprocess-spawn
    errors. Took several full-suite runs and a fresh-worktree bisect against the base
    branch to isolate, because the failure signature (same tests, every time) looked
    identical to a known ambient-load flakiness pattern already tracked in this project.
  evidence:
  - Zugruul/development-skills#187
  - Zugruul/development-skills#208
  generalized: A test runner that sources many test-section files into a single shell
    process (rather than subprocessing each) is vulnerable to any one section leaking
    shell state -- cwd, exported vars, PATH -- into every section that runs after
    it. A single unscoped `cd` inside a fixture, especially one whose target directory
    gets deleted moments later by cleanup, can silently corrupt an arbitrary number
    of later, unrelated tests. This failure mode is easy to misdiagnose as ambient
    flakiness because the affected test set is deterministic and unrelated in subject
    matter to the actual bug.
  routing:
    action: brain-note
    ref: dev/subshell-cd-in-sourced-test-fixtures
- category: recommendation
  area: testing
  severity: medium
  summary: Bisect against the base branch in a fresh worktree before attributing a
    failing full-suite run to already-tracked flakiness
  detail: Nearly cross-referenced a real regression as an instance of a known ambient-load-flakiness
    issue because the failure list looked identical across several retries and load
    happened to be elevated. A same-moment, fresh-worktree comparison against the
    base branch (0 failures there vs. the branch's consistent failures) immediately
    proved it was a real regression, not load. Had already posted a public cross-reference
    on the tracked issue before doing this check, and had to post a correction.
  evidence: []
  generalized: Before attributing a failing full-suite test run to a known/tracked
    flakiness pattern -- even when the failure set looks deterministic and system
    load is elevated -- verify by running the identical suite, at the same moment,
    in a separate fresh worktree checked out to the base branch. A real regression
    and elevated ambient load can coincide; only a same-moment base-branch comparison
    distinguishes them. Posting a cross-reference to a tracked flakiness issue before
    doing this check risks misleading anyone else who is actively working that issue.
  routing:
    action: brain-note
    ref: orchestrator/bisect-before-blaming-tracked-flakiness
- category: worked-well
  area: review
  severity: low
  summary: Two independently-spawned reviewer agents converging on the same verdict
    for one PR gave higher confidence than a single review would have
  detail: Ran independent reviewer subagents per PR (plus one accidental duplicate
    on the same PR from a resume mistake); all converged on APPROVE with substantively
    overlapping but non-identical findings, which read as a stronger signal than any
    single review alone.
  evidence: []
  generalized: Spawning more than one independent reviewer agent against the same
    diff, when they converge on the same verdict via different angles of examination,
    provides materially higher confidence than a single review pass -- worth the extra
    cost for changes where correctness matters and the diff is small enough that duplicate
    review isn't wasteful.
  routing:
    action: brain-note
    ref: orchestrator/dual-independent-review-raises-confidence
- category: friction
  area: merge
  severity: low
  summary: A PR-merge helper's local branch-sync step can report a failure even after
    the actual remote merge already succeeded
  detail: Running a PR-merge command while the local working tree was checked out
    to an unrelated branch (not the PR's base branch) produced a local git error about
    uncommitted-change conflicts during the post-merge branch fast-forward/cleanup
    step -- but the remote merge and branch deletion had already completed successfully
    via the API. The error text reads exactly like a failed merge.
  evidence: []
  generalized: A PR-merge CLI helper that performs the remote merge via API first
    and then attempts local branch bookkeeping (fast-forward, branch deletion) can
    surface a scary local git error purely from being invoked while the local working
    tree isn't on the PR's base branch -- even though the actual merge already succeeded.
    Always verify merge outcome via a direct state query (not the local command's
    own exit/error text) before treating it as failed, and prefer switching to the
    base branch before invoking the merge command to avoid the spurious error in the
    first place.
  routing:
