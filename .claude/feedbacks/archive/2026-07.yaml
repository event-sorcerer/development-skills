    ref: orchestrator/gh-pr-merge-off-main-local-sync-error
- category: friction
  area: board
  severity: low
  summary: A board-comment helper that only accepts its body via stdin silently produces
    an empty-body error when the body is passed as a positional argument instead
  detail: Passed a comment body as a trailing CLI argument instead of via stdin heredoc;
    the argument was silently ignored, stdin read as empty, and the remote API rejected
    the resulting empty comment body with a generic error that didn't point at the
    actual mistake (wrong invocation form).
  evidence: []
  generalized: A CLI wrapper whose write-body-only-via-stdin contract has no positional-argument
    fallback should ideally reject a stray positional body argument with a clear usage
    error, rather than silently ignoring it and producing an opaque empty-body error
    further downstream (e.g. from a remote API) that doesn't point back at the actual
    invocation mistake.
  routing:
    action: brain-note
    ref: orchestrator/board-comment-body-only-via-stdin
