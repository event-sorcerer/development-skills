  area: concurrency
  severity: high
  summary: Orchestrator file restore in a shared clone silently discarded a dev agent's
    uncommitted edit
  detail: While extracting a human's doc changes to main via a temp worktree, the
    orchestrator ran checkout -- on a file that also held the dev agent's uncommitted
    edit; the edit vanished with no error, costing one gate-failure cycle before the
    dev re-applied it. Root cause confirmed, not a race.
  evidence:
  - Zugruul/development-skills#252
  generalized: When an orchestrator and a dev agent share one working tree, any orchestrator
    git restore/checkout of a file can silently destroy the dev's uncommitted work.
    Either isolate lanes in worktrees, or require dev agents to commit early and often
    so no multi-tool-call edit sits uncommitted.
  routing:
    action: backlog
    ref: Zugruul/development-skills#285
