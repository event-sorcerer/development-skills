  summary: Session permission layer treats each new PR merge as unconsented even after
    allowlist rules and prior human consent
  detail: 'Even after the human added allow rules and consented to "merge all approved
    PRs autonomously",

    the classifier denied the very next PR''s approval-comment+merge because the consent
    named only

    the earlier PR numbers. Required a fresh AskUserQuestion round-trip.

    '
  evidence: []
  generalized: 'A permission layer may scope human consent to the specific artifacts
    named at consent time, not

    to a standing policy. The auto-review protocol should treat per-artifact consent
    as the expected

    case: batch the ask (one question covering the artifact under review AND standing
    consent going

    forward), and record in the iteration report which consent model the session is
    operating under.

    '
  proposal:
    target: skills/build-next/references/auto-review.md
    change: front-load question should also offer standing consent phrasing and note
      it may not bind the permission layer
  routing:
    action: backlog
    ref: '#33'
- category: friction
  area: concurrency
  component: skills/build-next/references/concurrency.md
  severity: medium
  summary: Parallel lanes editing one shared test-suite file forces rebase conflicts
    on every merge
  detail: 'Three lanes all appended sections to the single tests/run-tests.sh; every
    merge forced the

    surviving lane into conflict resolution on that file.

    '
  evidence: []
  generalized: 'A single monolithic test entry file is a guaranteed conflict point
    for parallel lanes. Consider

    per-area test files sourced by a thin runner so lanes append to disjoint files,
    or a documented

    append-only convention that git merges cleanly.

    '
  proposal:
    target: plugins/spec-workflow/tests/
    change: split run-tests.sh into per-area section files sourced by the runner
  routing:
    action: backlog
    ref: '#34'
- category: worked-well
