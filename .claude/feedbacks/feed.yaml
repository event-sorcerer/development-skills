    and the deleted task branch had to be recreated from the pre-merge tip to unblock
    In-review/QA moves.
  generalized: Task-close ordering under local delivery must run gate + all board
    moves from the task branch BEFORE deleting it, or the red-first guard should recognize
    a squash-merge context (merged tip with the branch gone).
  routing:
    action: backlog
    ref: Zugruul/development-skills#295
