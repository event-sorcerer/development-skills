  detail: Lock mtime 13:14:18Z, no live flush process, board still showed closed
    tasks as In progress. Orchestrator verified no holder, rmdir'd the lock, and
    re-issued every mutation from session memory. Filed as development-skills#104
    with the durability invariant (bytes on disk until mutation confirmed) and a
    pid-liveness lock probe.
  generalized: A durable queue is only durable if entries outlive a crash at EVERY
    point of the flush lifecycle; apply-then-delete per entry, and locks should
    carry holder liveness (pid) so a dead holder is broken immediately instead of
    stalling all flushes until a TTL.
