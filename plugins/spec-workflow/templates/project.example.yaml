# yaml-language-server: $schema=https://raw.githubusercontent.com/event-sorcerer/development-skills/main/plugins/spec-workflow/schemas/project-config.schema.json
schemaVersion: 2
project:
    name: my-platform
    description: One-line project description used in agent briefs
    mainBranch: main
    branchPattern: <prefix>/<id>-<slug>
boards:
  - id: main
    provider: github-project
    owner: your-gh-user
    repo: your-gh-user/my-platform
    projectNumber: 1
    projectId: PVT_replace_me
    fields:
        status:
            fieldId: PVTSSF_replace_me
            options:
                Backlog: aaaaaaaa
                In progress: bbbbbbbb
                In review: cccccccc
                QA: dddddddd
                Ready: eeeeeeee
                Deployed: ffffffff
        priority:
            fieldId: PVTSSF_replace_me
            options:
                P0: "11111111"
                P1: "22222222"
                P2: "33333333"
        estimate:
            fieldId: PVTF_replace_me
    statusFlow: [Backlog, In progress, In review, QA, Ready, Deployed]
    labels:
        bug: type:bug
        feature: type:feature
specs:
  - id: core
    title: Core platform
    board: main
    specPath: SPEC.md
    backlogPath: docs/BACKLOG.md
    taskPrefix: XX
    epics:
      - id: EI
        title: Infra + loop
        taskRanges: [[90, 99]]
      - id: E0
        title: Foundations
        taskRanges: [[1, 9]]
        blockedBy: []
      - id: E1
        title: First feature slice
        taskRanges: [[10, 19]]
        blockedBy:
          - epic: E0
            untilStatus: Deployed
    invariants:
      - State hard, non-negotiable rules here; they are pasted into every implementation brief.
commands:
    gate: pnpm gate
    gateFast: pnpm --filter <pkg> test
    devUp: ./dev.sh
    test: pnpm test
docs:
  - id: root
    path: README.md
    covers: ["**"]
    notes: user-facing usage + install; update when commands or behavior change
delegation:
    # A role maps to ONE identity or an ARRAY of identities. `models` = the ONLY models
    # that role may run on (FULL nomenclature, e.g. claude-sonnet-5[1m] — never "sonnet").
    # `covers` (optional) routes a monorepo path to a per-package dev agent; no covers = fallback.
    identities:
        dev:
          - name: "Dev Agent - {name}"
            email: "{local}+dev_agent@{domain}"
            models: ["claude-sonnet-5"]
        reviewer:
            name: "Reviewer Agent - {name}"
            email: "{local}+reviewer_agent@{domain}"
            models: ["claude-sonnet-5", "claude-sonnet-5[1m]"]
        orchestrator:
            name: "Orchestrator Agent - {name}"
            email: "{local}+orchestrator_agent@{domain}"
    # reviewerTokenEnv: GH_TOKEN_REVIEWER   # second account's token so auto-merge approvals are non-self
paths:
    handoffDir: docs/handoffs
    checkpointFile: .claude/CHECKPOINT
    designDir: docs/design
    specDeltaDir: docs/spec-deltas
    devDoc: docs/DEV.md
methodology:
    tdd: true
    isolationSuite: ""
    maxInProgress: 1
    autoMerge: false
    mergeMethod: squash
